name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pip install -e ".[build]"
      - name: Install GTK3 runtime
        run: choco install gtk-runtime -y
      - run: python scripts/build_exe.py
      - name: Install NSIS
        run: choco install nsis -y
      - run: makensis scripts/installer.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/FinacialSim-Setup-*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info fuse libfuse2
      - run: pip install -e .[dev]
      - run: pip install -e ".[build]"
      - run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool-x86_64.AppImage
      - run: chmod +x scripts/build_appimage.sh && APPIMAGE_TOOL=/usr/local/bin/appimagetool-x86_64.AppImage scripts/build_appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/FinacialSim-x86_64.AppImage

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: brew install pango gdk-pixbuf libffi create-dmg
      - run: pip install -e .[dev]
      - run: pip install -e ".[build]"
      - run: chmod +x scripts/build_macos.sh && scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/FinacialSim-*.dmg

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*
            linux-appimage/*
            macos-dmg/*
